name: MoonChat
options:
  bundleIdPrefix: com.moonchat
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15"

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"

targets:
  MoonChat:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: MoonChat
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.moonchat.app
        INFOPLIST_FILE: MoonChat/Info.plist
        TARGETED_DEVICE_FAMILY: "1"
    info:
      path: MoonChat/Info.plist
      properties:
        CFBundleDisplayName: MoonChat
        UILaunchScreen: {}
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
          NSAllowsArbitraryLoads: false
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
